<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" width="680" height="300" font-family="ui-sans-serif, -apple-system, 'Segoe UI', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">
  <rect x="0" y="0" width="680" height="300" rx="14" fill="#0d1117"/>
  <rect x="0.5" y="0.5" width="679" height="299" rx="14" fill="none" stroke="#30363d"/>

  <text x="28" y="42" fill="#e6edf3" font-size="20" font-weight="700">synth-persona</text>
  <text x="28" y="64" fill="#8b949e" font-size="12.5">census-grounded synthetic personas → market-research signal</text>

  <!-- pipeline nodes -->
  <g font-size="12.5" text-anchor="middle">
    <!-- node 1 -->
    <rect x="24" y="92" width="104" height="56" rx="9" fill="#161b22" stroke="#30363d"/>
    <text x="76" y="116" fill="#e6edf3" font-weight="600">통계청</text>
    <text x="76" y="133" fill="#8b949e" font-size="11">census</text>
    <!-- node 2 -->
    <rect x="160" y="92" width="92" height="56" rx="9" fill="#161b22" stroke="#30363d"/>
    <text x="206" y="116" fill="#e6edf3" font-weight="600">IPF</text>
    <text x="206" y="133" fill="#8b949e" font-size="11">joint dist.</text>
    <!-- node 3 -->
    <rect x="284" y="92" width="104" height="56" rx="9" fill="#161b22" stroke="#30363d"/>
    <text x="336" y="116" fill="#e6edf3" font-weight="600">페르소나</text>
    <text x="336" y="133" fill="#8b949e" font-size="11">N personas</text>
    <!-- node 4 -->
    <rect x="420" y="92" width="92" height="56" rx="9" fill="#161b22" stroke="#30363d"/>
    <text x="466" y="116" fill="#e6edf3" font-weight="600">LLM</text>
    <text x="466" y="133" fill="#8b949e" font-size="11">simulate</text>
    <!-- node 5 -->
    <rect x="544" y="92" width="112" height="56" rx="9" fill="#161b22" stroke="#388bfd"/>
    <text x="600" y="116" fill="#e6edf3" font-weight="600">signal</text>
    <text x="600" y="133" fill="#8b949e" font-size="11">🔴 / 🟢</text>
  </g>

  <!-- arrows -->
  <g stroke="#484f58" stroke-width="1.6" fill="none" marker-end="url(#a)">
    <defs>
      <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
        <path d="M0,0 L6,3 L0,6 Z" fill="#484f58"/>
      </marker>
    </defs>
    <line x1="130" y1="120" x2="156" y2="120"/>
    <line x1="254" y1="120" x2="280" y2="120"/>
    <line x1="390" y1="120" x2="416" y2="120"/>
    <line x1="514" y1="120" x2="540" y2="120"/>
  </g>

  <!-- signal legend -->
  <g font-size="12.5">
    <rect x="24" y="186" width="632" height="86" rx="10" fill="#0b1f17" stroke="#1f6f43"/>
    <text x="40" y="210" font-size="14">🟢</text>
    <text x="62" y="210" fill="#e6edf3" font-weight="600">consensus</text>
    <text x="62" y="228" fill="#8b949e" font-size="11.5">의견 합의 → 추가 조사 불필요</text>

    <text x="360" y="210" font-size="14">🔴</text>
    <text x="382" y="210" fill="#e6edf3" font-weight="600">split</text>
    <text x="382" y="228" fill="#8b949e" font-size="11.5">의견 분열 → 여기에 진짜 조사를 조준</text>

    <text x="40" y="256" fill="#c9d1d9" font-size="12">
      “정답을 맞히는” 게 아니라 <tspan fill="#58a6ff">어디를 조사해야 하는지</tspan>를 찾아준다 · seed-deterministic · runs key-free with --mock
    </text>
  </g>
</svg>
